data:
  real_dir: "data/real"
  generated_dirs:
    # ── Main model runs — uncomment the model(s) you want to analyse ──────────
    klein_distilled:   "data/generated/klein_distilled"    # LADD distilled, s=4,  g=1.0
    klein_base_g4_s50: "data/generated/klein_base_g4_s50"    # MSE base,       s=50, g=4.0
    flux2_max:         "data/generated/flux2_max"           # BFL playground
    # gguf_q8:           "data/generated/gguf_q8"
    # gguf_q5:           "data/generated/gguf_q5"
    # gguf_q4:           "data/generated/gguf_q4"

    # ── Guidance × Steps ablation grid ────────────────────────────────────────
    # Handled by run_grid_analysis.py. Uncomment here only to run them through
    # the standard run_analysis.py / run_detection.py pipeline individually.
    # klein_base_g1_s50: "data/generated/klein_base_g1_s50"  # grid B: s=50, g=1.0
    # klein_base_g4_s4:  "data/generated/klein_base_g4_s4"   # grid C: s=4,  g=4.0
    # klein_base_g1_s4:  "data/generated/klein_base_g1_s4"   # grid D: s=4,  g=1.0
    # klein_base_g1_s10: "data/generated/klein_base_g1_s10"  # grid E: s=10, g=1.0
    # klein_base_g1_s20: "data/generated/klein_base_g1_s20"  # grid F: s=20, g=1.0
  image_size: 1024

spectral:
  max_radius: 512              # image_size // 2
  spectrum_bins: 512           # full-resolution radial spectrum
  frequency_bands: 3           # low / mid / high
  normalize_method: "sum_to_one"

controls:
  degradation_methods:
    - blur_1.5
    - downup_512
    - jpeg_85
  run_2d_analysis: true
  run_per_category: true

detection:
  feature_bins: 128            # spectrum bins for LR/SVM/RF feature vector
  cv_folds: 5
  random_seed: 42
  classifiers:
    - logistic_regression
    - svm_rbf
    - random_forest
